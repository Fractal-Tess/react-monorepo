pre-commit:
  jobs:
    - name: ultracite
      glob:
        - "apps/convex/**/*.js"
        - "apps/convex/**/*.jsx"
        - "apps/convex/**/*.ts"
        - "apps/convex/**/*.tsx"
        - "apps/convex/**/*.json"
        - "apps/convex/**/*.jsonc"
        - "apps/convex/**/*.css"
        - "apps/pocketbase/**/*.ts"
        - "apps/pocketbase/**/*.tsx"
      run: bun x ultracite fix {staged_files}
      stage_fixed: true
