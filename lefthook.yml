pre-commit:
  jobs:
    - name: ultracite
      glob:
        - "apps/convex/**/*.js"
        - "apps/convex/**/*.jsx"
        - "apps/convex/**/*.ts"
        - "apps/convex/**/*.tsx"
        - "apps/convex/**/*.json"
        - "apps/convex/**/*.jsonc"
        - "apps/convex/**/*.css"
      run: bun x ultracite fix apps/convex
      stage_fixed: true
