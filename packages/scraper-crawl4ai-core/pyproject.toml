[project]
name = "scraper-crawl4ai-core"
version = "0.1.0"
description = "Shared Crawl4AI helpers for selector-based and LLM-assisted scraping"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
  "crawl4ai>=0.8.0",
  "litellm>=1.79.0",
]

[dependency-groups]
dev = [
  "pytest>=8.4.2",
  "pytest-asyncio>=1.2.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/scraper_crawl4ai_core"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
