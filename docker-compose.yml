services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  convex-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: convex
      POSTGRES_PASSWORD: ${CONVEX_POSTGRES_PASSWORD:-convexpassword}
      POSTGRES_USER: ${CONVEX_POSTGRES_USER:-convex}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - convex_postgres_data:/var/lib/postgresql/data

  convex-backend:
    image: ghcr.io/get-convex/convex-backend:c13a9ff74820874b60ea52e08b36338d7dbb3ffd
    depends_on:
      convex-postgres:
        condition: service_healthy
    environment:
      CONVEX_CLOUD_ORIGIN: ${CONVEX_CLOUD_ORIGIN:-http://127.0.0.1:3210}
      CONVEX_SITE_ORIGIN: ${CONVEX_SITE_ORIGIN:-http://127.0.0.1:3211}
      DISABLE_BEACON: "true"
      DOCUMENT_RETENTION_DELAY: ${CONVEX_DOCUMENT_RETENTION_DELAY:-172800}
      DO_NOT_REQUIRE_SSL: ${CONVEX_DO_NOT_REQUIRE_SSL:-1}
      INSTANCE_NAME: ${CONVEX_INSTANCE_NAME:-convex}
      INSTANCE_SECRET: ${CONVEX_INSTANCE_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      POSTGRES_URL: ${CONVEX_POSTGRES_URL:-postgresql://${CONVEX_POSTGRES_USER:-convex}:${CONVEX_POSTGRES_PASSWORD:-convexpassword}@convex-postgres:5432}
      RUST_LOG: ${CONVEX_RUST_LOG:-info}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3210/version"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    ports:
      - "3210:3210"
      - "3211:3211"

  convex-dashboard:
    image: ghcr.io/get-convex/convex-dashboard:c13a9ff74820874b60ea52e08b36338d7dbb3ffd
    depends_on:
      convex-backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_DEPLOYMENT_URL: ${NEXT_PUBLIC_CONVEX_DEPLOYMENT_URL:-http://127.0.0.1:3210}
      NEXT_PUBLIC_LOAD_MONACO_INTERNALLY: ${NEXT_PUBLIC_LOAD_MONACO_INTERNALLY:-1}
    ports:
      - "6791:6791"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      worker:
        condition: service_healthy
    environment:
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_CONVEX_URL: ${NEXT_PUBLIC_CONVEX_URL:-}
      NODE_ENV: production
      PORT: 3000
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const response = await fetch('http://127.0.0.1:3000'); if (!response.ok) throw new Error('status ' + response.status)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "3000:3000"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-app}@postgres:5432/${POSTGRES_DB:-app}
      NODE_ENV: production
      PORT: 4000
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "const response = await fetch('http://127.0.0.1:4000/health'); if (!response.ok) throw new Error('status ' + response.status)",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
    ports:
      - "4000:4000"

  convex:
    build:
      context: .
      dockerfile: packages/convex/Dockerfile
    profiles: ["tools"]
    environment:
      CONVEX_DEPLOYMENT: ${CONVEX_DEPLOYMENT:-}
      CONVEX_DEPLOY_KEY: ${CONVEX_DEPLOY_KEY:-}

volumes:
  convex_postgres_data:
  postgres_data:
